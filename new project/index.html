<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>GrayFX</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
            rel="stylesheet" />
        <style>
            .tiktok-sans-600 > {
                font-family: "TikTok Sans", sans-serif;
                font-optical-sizing: auto;
                font-weight: 600;
                font-style: normal;
                font-variation-settings:
                    "slnt" 0,
                    "wdth" 100;
            }
            :root {
                --primary: #2885b8;
                --background: #000000;
                --text-light: #f0f0f0;
                --text-muted: #cccccc;
            }

            body {
                margin: 0;
                font-family: "TikTok Sans";
                background-color: var(--background);
                color: var(--text-light);
            }

            .site-title {
                text-align: center;
                font-size: 5rem;
                font-weight: bold;
                margin: 30px 0 10px 0;
                 background: linear-gradient(to right, #228EBD, #8DD0FC);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
            }

            header {
                background-color: var(--background);
                padding: 10px 20px 30px;
                text-align: center;
            }

            .button-group {
                display: flex;
                justify-content: center;
                gap: 20px;
                margin-top: 20px;
            }

            .button {
                background-color: var(--primary);
                color: #fff;
                padding: 16px 30px;
                font-size: 1.2rem;
                font-weight: bold;
                border: none;
                border-radius: 8px;
                text-decoration: none;
                transition: background-color 0.3s ease;
            }

            .button:hover {
                background-color: #1e6c97;
            }

            .gallery {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 20px;
                padding: 40px 30px;
                max-width: 1000px;
                margin: 0 auto;
            }

            .gallery-item {
                background-color: #111;
                border-radius: 8px;
                overflow: hidden;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
            }

            .gallery-item img {
                width: 100%;
                height: auto;
                display: block;
            }

            .caption {
                padding: 12px 16px;
                font-size: 1rem;
                color: var(--text-muted);
                text-align: center;
            }

            footer {
                text-align: center;
                padding: 30px 20px;
                font-size: 0.9rem;
                color: #777;
            }

            @media (max-width: 600px) {
                .site-title {
                    font-size: 2.2rem;
                }

                .button {
                    font-size: 1rem;
                    padding: 12px 20px;
                }
            }

            * {
                box-sizing: border-box;
            }

            /* Slideshow container */
            .slideshow-container {
                max-width: 70%;
                position: relative;
                margin: auto;
            }

            /* Hide the images by default */
            .mySlides {
                display: none;
            }

            /* Next & previous buttons */
            .prev,
            .next {
                cursor: pointer;
                position: absolute;
                top: 50%;
                width: auto;
                margin-top: -22px;
                padding: 16px;
                color: white;
                font-weight: bold;
                font-size: 18px;
                transition: 0.6s ease;
                border-radius: 0 3px 3px 0;
                user-select: none;
            }

            /* Position the "next button" to the right */
            .next {
                right: 0;
                border-radius: 3px 0 0 3px;
            }

            /* On hover, add a black background color with a little bit see-through */
            .prev:hover,
            .next:hover {
                background-color: rgba(0, 0, 0, 0.8);
            }

            /* Caption text */
            .text {
                color: #f2f2f2;
                font-size: 15px;
                padding: 8px 12px;
                position: absolute;
                bottom: 8px;
                width: 100%;
                text-align: center;
            }

            /* Number text (1/3 etc) */
            .numbertext {
                color: #f2f2f2;
                font-size: 12px;
                padding: 8px 12px;
                position: absolute;
                top: 0;
            }

            /* The dots/bullets/indicators */
            .dot {
                cursor: pointer;
                height: 15px;
                width: 15px;
                margin: 0 2px;
                background-color: #bbb;
                border-radius: 50%;
                display: inline-block;
                transition: background-color 0.6s ease;
            }

            .active,
            .dot:hover {
                background-color: #717171;
            }

            /* Fading animation */
            .fade {
                animation-name: fade;
                animation-duration: 1.5s;
            }

            @keyframes fade {
                from {
                    opacity: 0.4;
                }
                to {
                    opacity: 1;
                }
            }
            .cssbuttons-io {
                position: relative;
                font-family: inherit;
                font-weight: 500;
                font-size: 18px;
                letter-spacing: 0.05em;
                border-radius: 0.8em;
                cursor: pointer;
                border: none;
                background: linear-gradient(to right, #228EBD, #8DD0FC);
                color: ghostwhite;
                overflow: hidden;
            }

            .cssbuttons-io svg {
                width: 1.2em;
                height: 1.2em;
                margin-right: 0.5em;
            }

            .cssbuttons-io span {
                position: relative;
                z-index: 10;
                transition: color 0.4s;
                display: inline-flex;
                align-items: center;
                padding: 0.8em 1.2em 0.8em 1.05em;
            }

            .cssbuttons-io::before,
            .cssbuttons-io::after {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 0;
            }

            .cssbuttons-io::before {
                content: "";
                background: #000;
                width: 120%;
                left: -10%;
                transform: skew(30deg);
                transition: transform 0.4s cubic-bezier(0.3, 1, 0.8, 1);
            }

            .cssbuttons-io:hover::before {
                transform: translate3d(100%, 0, 0);
            }

            .cssbuttons-io:active {
                transform: scale(0.95);
            }
        </style>
        <script>
            window.onload = function () {
                currentSlide(1);
            };

            let slideIndex = 1;

            function plusSlides(n) {
                showSlides((slideIndex += n));
            }

            function currentSlide(n) {
                showSlides((slideIndex = n));
            }

            function showSlides(n) {
                let i;
                let slides = document.getElementsByClassName("mySlides");
                let dots = document.getElementsByClassName("dot");

                if (n > slides.length) {
                    slideIndex = 1;
                }
                if (n < 1) {
                    slideIndex = slides.length;
                }

                for (i = 0; i < slides.length; i++) {
                    slides[i].style.display = "none";
                }

                for (i = 0; i < dots.length; i++) {
                    dots[i].className = dots[i].className.replace(" active", "");
                }

                slides[slideIndex - 1].style.display = "block";
                dots[slideIndex - 1].className += " active";
            }
        </script>
    </head>
    <body>
        <script>
            currentSlide(1);
        </script>
        <div class="site-title">GrayFX</div>

        <header>
            <div class="button-group">
                <button class="cssbuttons-io">
                    <span> Create Booking</span>
                </button>

                <button class="cssbuttons-io">
                    <span> View Portfolio</span>
                </button>
            </div>
        </header>

        <!-- Slideshow container -->
        <div class="slideshow-container">
            <!-- Full-width images with number and caption text -->
            <div class="mySlides fade">
                <div class="numbertext">1 / 7</div>
                <img src="/images/photo1.jpg" style="width: 100%" />
                <div class="text">Caption Text</div>
            </div>

            <div class="mySlides fade">
                <div class="numbertext">2 / 7</div>
                <img src="/images/photo2.jpg" style="width: 100%" />
                <div class="text">Caption Two</div>
            </div>

            <div class="mySlides fade">
                <div class="numbertext">3 / 7</div>
                <img src="/images/photo3.jpg" style="width: 100%" />
                <div class="text">Caption Three</div>
            </div>

            <div class="mySlides fade">
                <div class="numbertext">4 / 7</div>
                <img src="/images/photo4.jpg" style="width: 100%" />
                <div class="text">Caption Text</div>
            </div>

            <div class="mySlides fade">
                <div class="numbertext">5 / 7</div>
                <img src="/images/photo5.jpg" style="width: 100%" />
                <div class="text">Caption Two</div>
            </div>

            <div class="mySlides fade">
                <div class="numbertext">6 / 7</div>
                <img src="/images/photo6.jpg" style="width: 100%" />
                <div class="text">Caption Three</div>
            </div>

            <div class="mySlides fade">
                <div class="numbertext">7 / 7</div>
                <img src="/images/photo7.jpg" style="width: 100%" />
                <div class="text">Caption Three</div>
            </div>

            <!-- Next and previous buttons -->
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
                                                      <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
        <br />

        <!-- The dots/circles -->
        <div style="text-align: center">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
            <span class="dot" onclick="currentSlide(4)"></span>
            <span class="dot" onclick="currentSlide(5)"></span>
            <span class="dot" onclick="currentSlide(6)"></span>
            <span class="dot" onclick="currentSlide(7)"></span>
        </div>

        <footer>&copy; 2025 GrayFX. All rights reserved.</footer>
    </body>
</html>
